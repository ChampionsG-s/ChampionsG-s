<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .shield-bg { fill: #1e3a8a; }
      .shield-border { fill: #D4AF37; }
      .shield-text { font-size: 120px; font-weight: bold; fill: #D4AF37; font-family: Arial, sans-serif; }
    </style>
  </defs>
  
  <!-- Fondo del escudo -->
  <path class="shield-bg" d="M 50 20 L 150 20 L 150 100 Q 100 160 50 100 Z" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Letra G principal -->
  <text class="shield-text" x="100" y="130" text-anchor="middle">G</text>
  
  <!-- Corona simplificada en la parte superior -->
  <circle cx="50" cy="40" r="6" fill="#D4AF37"/>
  <circle cx="100" cy="15" r="8" fill="#D4AF37"/>
  <circle cx="150" cy="40" r="6" fill="#D4AF37"/>
</svg>
